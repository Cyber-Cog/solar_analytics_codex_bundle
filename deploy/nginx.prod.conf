# Production nginx template. Copy to deploy/nginx.prod.conf on the host,
# swap in your cert paths, and compose up.
#
# This one adds:
#   - HTTPS with HSTS
#   - HTTP->HTTPS redirect
#   - security headers
#   - longer proxy timeouts for report generation
#
# Keep it as a sibling of docker-compose.prod.yml so the overlay mount resolves.

upstream solar_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # TODO: point at your real certs (Let's Encrypt, ACM, etc.)
    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 256m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json application/javascript text/css text/javascript image/svg+xml;

    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location ~ ^/(api|auth|docs|openapi\.json|health) {
        proxy_pass http://solar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

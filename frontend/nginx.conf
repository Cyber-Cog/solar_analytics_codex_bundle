# Nginx reverse proxy for Solar Analytics.
#
# - Serves the static UI out of /usr/share/nginx/html.
# - Forwards API routes to the FastAPI backend container (service "backend").
# - Gzips text-heavy assets (JS/CSS/JSON) but not images.
# - Lets the backend handle file uploads: we bump client_max_body_size so
#   SCB / inverter spreadsheets don't get truncated.

upstream solar_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Large enough for the biggest NTPC upload template.
    client_max_body_size 256m;

    # Long reads for report generation / analytics queries.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # Cache static assets aggressively — they're all versioned by filename or
    # can be cache-busted by deploying a new image.
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # API endpoints -> FastAPI.
    location /api/ {
        proxy_pass http://solar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://solar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /docs {
        proxy_pass http://solar_backend;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://solar_backend;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://solar_backend;
        proxy_set_header Host $host;
    }

    # SPA entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

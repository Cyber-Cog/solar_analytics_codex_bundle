services:
  - type: web
    name: solar-analytics
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "8000"
      - key: GUNICORN_WORKERS
        value: "3"
      - key: GUNICORN_TIMEOUT
        value: "180"
      - key: DATABASE_URL
        fromDatabase:
          name: solar-analytics-db
          property: connectionString
      - key: DATABASE_URL_READ
        fromDatabase:
          name: solar-analytics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: solar-analytics-redis
          property: connectionString
    disk:
      name: solar-uploads
      mountPath: /app/backend/uploads
      sizeGB: 10
  - type: keyvalue
    name: solar-analytics-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: solar-analytics-db
    plan: starter
    databaseName: solar
    user: solar
